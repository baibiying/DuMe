services:
  postgres:
    image: postgres:16
    container_name: dume-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dume
    volumes:
      - dume_pg_data:/var/lib/postgresql/data

volumes:
  dume_pg_data:
